<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    :root {
      color-scheme: light;
      --text: #31333f;
      --muted: #767d87;
      --border: rgba(49, 51, 63, 0.2);
      --bg: #ffffff;
      --radius: 0.5rem;
      --focus: rgb(255, 75, 75);
    }

    html, body {
      margin: 0;
      padding: 0;
      background: transparent;
      font-family: "Source Sans Pro", sans-serif;
      color: var(--text);
    }

    .field {
      width: 100%;
      display: grid;
      gap: 0.28rem;
    }

    label {
      font-size: 1rem;
      font-weight: 400;
      line-height: 1.5;
      color: var(--text);
    }

    input {
      width: 100%;
      box-sizing: border-box;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--bg);
      color: var(--text);
      font: inherit;
      font-size: 1rem;
      line-height: 1.4;
      padding: 0.625rem 0.75rem;
      outline: none;
      box-shadow: none;
    }

    input::placeholder {
      color: var(--muted);
      opacity: 1;
    }

    input:focus {
      border-color: var(--focus);
      box-shadow: 0 0 0 1px var(--focus);
    }

    input:disabled {
      background: #f3f4f8;
      color: #8a8f98;
      cursor: not-allowed;
    }
  </style>
</head>
<body>
  <div class="field">
    <label id="label" for="input"></label>
    <input id="input" type="text" />
  </div>

  <script>
    const labelEl = document.getElementById("label");
    const inputEl = document.getElementById("input");
    let initialized = false;
    let lastValue = "";
    const COMPONENT_READY = "streamlit:componentReady";
    const SET_COMPONENT_VALUE = "streamlit:setComponentValue";
    const SET_FRAME_HEIGHT = "streamlit:setFrameHeight";
    const RENDER_EVENT = "streamlit:render";

    function sendMessage(type, data) {
      const payload = Object.assign(
        {
          isStreamlitMessage: true,
          type,
        },
        data || {}
      );
      window.parent.postMessage(payload, "*");
    }

    function syncHeight() {
      sendMessage(SET_FRAME_HEIGHT, { height: document.documentElement.scrollHeight });
    }

    function onRender(event) {
      const args = (event.data && event.data.args) || {};
      labelEl.textContent = args.label || "";
      inputEl.placeholder = args.placeholder || "";
      inputEl.disabled = !!args.disabled;

      const nextValue = args.value ?? "";
      if (!initialized || document.activeElement !== inputEl || nextValue !== lastValue) {
        inputEl.value = nextValue;
        lastValue = nextValue;
      }

      initialized = true;
      syncHeight();
    }

    inputEl.addEventListener("input", (event) => {
      lastValue = event.target.value;
      sendMessage(SET_COMPONENT_VALUE, { value: lastValue });
    });

    window.addEventListener("message", (event) => {
      if (event.data && event.data.type === RENDER_EVENT) {
        onRender(event);
      }
    });

    window.addEventListener("load", syncHeight);
    sendMessage(COMPONENT_READY, { apiVersion: 1 });
    syncHeight();
  </script>
</body>
</html>
